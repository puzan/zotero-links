name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(git describe --tags --always | sed 's/^v//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "xpi=zotero-links-${VERSION}.xpi" >> $GITHUB_OUTPUT

      - name: Build XPI
        run: ./build.sh "${{ steps.version.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-links-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.xpi }}

      - name: Generate updates.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_ID=$(jq -r '.applications.zotero.id' manifest.json)
          MIN_VER=$(jq -r '.applications.zotero.strict_min_version' manifest.json)
          MAX_VER=$(jq -r '.applications.zotero.strict_max_version' manifest.json)
          XPI_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/zotero-links-${VERSION}.xpi"
          jq -n \
            --arg id "$PLUGIN_ID" \
            --arg version "$VERSION" \
            --arg url "$XPI_URL" \
            --arg min "$MIN_VER" \
            --arg max "$MAX_VER" \
            '{addons: {($id): {updates: [{version: $version, update_link: $url, applications: {zotero: {strict_min_version: $min, strict_max_version: $max}}}]}}}' \
            > updates.json

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.xpi }}
            updates.json
          generate_release_notes: true
