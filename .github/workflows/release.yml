name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build XPI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./build.sh "$VERSION"
          echo "XPI=zotero-links-${VERSION}.xpi" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.XPI }}
          generate_release_notes: true
